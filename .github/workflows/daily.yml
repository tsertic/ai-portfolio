name: Daily Portfolio Regeneration

on:
  # Run every day at 07:00 UTC (09:00 Zagreb time)
  schedule:
    - cron: "0 7 * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit & push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate portfolio
        env:
          AI_PROVIDER:       ${{ vars.AI_PROVIDER }}
          USE_RANDOM_LLM:    ${{ vars.USE_RANDOM_LLM }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate.js

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "🤖 Daily regeneration $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
