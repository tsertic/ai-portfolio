<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220" fill="none">
  <!-- Main branch -->
  <line x1="40" y1="110" x2="260" y2="110" stroke="currentColor" stroke-width="2" opacity="0.4"/>
  <!-- Feature branch -->
  <path d="M100 110 Q100 50 160 50 L240 50" stroke="currentColor" stroke-width="1.5" opacity="0.3" fill="none" stroke-dasharray="5 3"/>
  <!-- Hotfix branch -->
  <path d="M160 110 Q160 165 200 165 L240 165" stroke="currentColor" stroke-width="1.5" opacity="0.25" fill="none" stroke-dasharray="5 3"/>
  <!-- Merge back -->
  <path d="M200 50 Q240 50 240 110" stroke="currentColor" stroke-width="1.5" opacity="0.3" fill="none"/>
  <!-- Commits on main -->
  <circle cx="40"  cy="110" r="7" stroke="currentColor" stroke-width="2" fill="currentColor" fill-opacity="0.15" opacity="0.6"/>
  <circle cx="100" cy="110" r="7" stroke="currentColor" stroke-width="2" fill="currentColor" fill-opacity="0.15" opacity="0.6"/>
  <circle cx="160" cy="110" r="7" stroke="currentColor" stroke-width="2" fill="currentColor" fill-opacity="0.15" opacity="0.6"/>
  <circle cx="240" cy="110" r="7" stroke="currentColor" stroke-width="2" fill="currentColor" fill-opacity="0.2" opacity="0.7"/>
  <!-- Commits on feature -->
  <circle cx="140" cy="50"  r="5" stroke="currentColor" stroke-width="1.5" fill="currentColor" fill-opacity="0.1" opacity="0.5"/>
  <circle cx="200" cy="50"  r="5" stroke="currentColor" stroke-width="1.5" fill="currentColor" fill-opacity="0.1" opacity="0.5"/>
  <!-- Commits on hotfix -->
  <circle cx="220" cy="165" r="5" stroke="currentColor" stroke-width="1.5" fill="currentColor" fill-opacity="0.1" opacity="0.4"/>
  <!-- Labels -->
  <text x="38"  y="100" font-family="monospace" font-size="8" fill="currentColor" opacity="0.4" text-anchor="middle">init</text>
  <text x="240" y="100" font-family="monospace" font-size="8" fill="currentColor" opacity="0.5" text-anchor="middle">HEAD</text>
  <text x="170"  y="42"  font-family="monospace" font-size="8" fill="currentColor" opacity="0.35">feat/ui</text>
  <text x="205"  y="158"  font-family="monospace" font-size="8" fill="currentColor" opacity="0.3">hotfix</text>
</svg>
