<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 160" fill="none">
  <!-- Main 404 text blocks -->
  <rect x="20"  y="30" width="70" height="90" rx="4" fill="currentColor" opacity="0.07" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="110" y="30" width="80" height="90" rx="4" fill="currentColor" opacity="0.07" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="210" y="30" width="70" height="90" rx="4" fill="currentColor" opacity="0.07" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="55"  y="90" font-family="monospace" font-size="52" font-weight="bold" fill="currentColor" opacity="0.35" text-anchor="middle">4</text>
  <text x="150" y="90" font-family="monospace" font-size="52" font-weight="bold" fill="currentColor" opacity="0.35" text-anchor="middle">0</text>
  <text x="245" y="90" font-family="monospace" font-size="52" font-weight="bold" fill="currentColor" opacity="0.35" text-anchor="middle">4</text>
  <!-- Glitch slices -->
  <rect x="20"  y="52" width="70" height="8" fill="currentColor" opacity="0.08" transform="translate(5,0)"/>
  <rect x="110" y="68" width="80" height="6" fill="currentColor" opacity="0.06" transform="translate(-4,0)"/>
  <rect x="210" y="58" width="70" height="5" fill="currentColor" opacity="0.07" transform="translate(7,0)"/>
  <!-- Error label -->
  <text x="150" y="145" font-family="monospace" font-size="11" fill="currentColor" opacity="0.3" text-anchor="middle">Page Not Found</text>
  <!-- Scan line overlay -->
  <line x1="0" y1="75" x2="300" y2="75" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="80" x2="300" y2="80" stroke="currentColor" stroke-width="0.5" opacity="0.1"/>
</svg>
