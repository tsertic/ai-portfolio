<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 180" fill="none">
  <rect x="2" y="2" width="356" height="176" rx="10" stroke="currentColor" stroke-width="1.5" opacity="0.25" fill="currentColor" fill-opacity="0.04"/>
  <!-- Title bar -->
  <rect x="2" y="2" width="356" height="28" rx="10" fill="currentColor" opacity="0.07"/>
  <circle cx="20" cy="16" r="5" fill="currentColor" opacity="0.3"/>
  <circle cx="36" cy="16" r="5" fill="currentColor" opacity="0.25"/>
  <circle cx="52" cy="16" r="5" fill="currentColor" opacity="0.2"/>
  <text x="180" y="20" font-family="monospace" font-size="10" fill="currentColor" opacity="0.25" text-anchor="middle">zsh — 80×24</text>
  <!-- Prompt lines -->
  <g font-family="monospace" font-size="12" fill="currentColor">
    <text x="16" y="58"  opacity="0.4">~  $  git status</text>
    <text x="16" y="76"  opacity="0.25">On branch main</text>
