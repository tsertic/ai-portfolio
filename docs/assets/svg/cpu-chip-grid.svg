<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- Outer frame -->
  <rect x="60" y="60" width="120" height="120" rx="8" stroke="currentColor" stroke-width="2" opacity="0.4" fill="currentColor" fill-opacity="0.05"/>
  <!-- Inner core -->
  <rect x="80" y="80" width="80" height="80" rx="4" stroke="currentColor" stroke-width="1.5" opacity="0.3" fill="currentColor" fill-opacity="0.08"/>
  <!-- Grid inside core -->
  <line x1="93" y1="80" x2="93" y2="160" stroke="currentColor" stroke-width="0.8" opacity="0.2"/>
  <line x1="107" y1="80" x2="107" y2="160" stroke="currentColor" stroke-width="0.8" opacity="0.2"/>
  <line x1="120" y1="80" x2="120" y2="160" stroke="currentColor" stroke-width="0.8" opacity="0.2"/>
  <line x1="133" y1="80" x2="133" y2="160" stroke="currentColor" stroke-width="0.8" opacity="0.2"/>
  <line x1="147" y1="80" x2="147" y2="160" stroke="currentColor" stroke-width="0.8" opacity="0.2"/>
  <line x1="80" y1="93" x2="160" y2="93" stroke="currentColor" stroke-width="0.8" opacity="0.2"/>
  <line x1="80" y1="107" x2="160" y2="107" stroke="currentColor" stroke-width="0.8" opacity="0.2"/>
  <line x1="80" y1="120" x2="160" y2="120" stroke="currentColor" stroke-width="0.8" opacity="0.2"/>
  <line x1="80" y1="133" x2="160" y2="133" stroke="currentColor" stroke-width="0.8" opacity="0.2"/>
  <line x1="80" y1="147" x2="160" y2="147" stroke="currentColor" stroke-width="0.8" opacity="0.2"/>
  <!-- Pins top/bottom -->
  <g stroke="currentColor" stroke-width="2" opacity="0.5" stroke-linecap="round">
    <line x1="80"  y1="60" x2="80"  y2="40"/><line x1="100" y1="60" x2="100" y2="40"/>
    <line x1="120" y1="60" x2="120" y2="40"/><line x1="140" y1="60" x2="140" y2="40"/>
    <line x1="160" y1="60" x2="160" y2="40"/>
    <line x1="80"  y1="180" x2="80"  y2="200"/><line x1="100" y1="180" x2="100" y2="200"/>
    <line x1="120" y1="180" x2="120" y2="200"/><line x1="140" y1="180" x2="140" y2="200"/>
    <line x1="160" y1="180" x2="160" y2="200"/>
  </g>
  <!-- Pins left/right -->
  <g stroke="currentColor" stroke-width="2" opacity="0.5" stroke-linecap="round">
    <line x1="60" y1="80"  x2="40" y2="80"/><line x1="60" y1="100" x2="40" y2="100"/>
    <line x1="60" y1="120" x2="40" y2="120"/><line x1="60" y1="140" x2="40" y2="140"/>
    <line x1="60" y1="160" x2="40" y2="160"/>
    <line x1="180" y1="80"  x2="200" y2="80"/><line x1="180" y1="100" x2="200" y2="100"/>
    <line x1="180" y1="120" x2="200" y2="120"/><line x1="180" y1="140" x2="200" y2="140"/>
    <line x1="180" y1="160" x2="200" y2="160"/>
  </g>
</svg>
