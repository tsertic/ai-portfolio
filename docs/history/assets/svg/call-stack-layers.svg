<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 300" fill="none">
  <g font-family="monospace" font-size="11" fill="currentColor">
    <!-- Stack frames top to bottom -->
    <rect x="40" y="20"  width="180" height="40" rx="5" stroke="currentColor" stroke-width="2" opacity="0.55" fill="currentColor" fill-opacity="0.12"/>
    <text x="130" y="44"  opacity="0.6" text-anchor="middle">validate(result)</text>
    <rect x="40" y="72"  width="180" height="40" rx="5" stroke="currentColor" stroke-width="1.5" opacity="0.45" fill="currentColor" fill-opacity="0.08"/>
    <text x="130" y="96"  opacity="0.5" text-anchor="middle">transform(input)</text>
    <rect x="40" y="124" width="180" height="40" rx="5" stroke="currentColor" stroke-width="1.5" opacity="0.35" fill="currentColor" fill-opacity="0.06"/>
    <text x="130" y="148" opacity="0.4" text-anchor="middle">processData(data)</text>
    <rect x="40" y="176" width="180" height="40" rx="5" stroke="currentColor" stroke-width="1"   opacity="0.28" fill="currentColor" fill-opacity="0.05"/>
    <text x="130" y="200" opacity="0.3" text-anchor="middle">handleRequest(req)</text>
    <rect x="40" y="228" width="180" height="40" rx="5" stroke="currentColor" stroke-width="1"   opacity="0.2"  fill="currentColor" fill-opacity="0.04"/>
    <text x="130" y="252" opacity="0.22" text-anchor="middle">main()</text>
  </g>
  <!-- Arrow pointer -->
  <path d="M18 40 L34 40" stroke="currentColor" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <path d="M28 34 L35 40 L28 46" stroke="currentColor" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Label -->
  <text x="130" y="285" font-family="monospace" font-size="9" fill="currentColor" opacity="0.3" text-anchor="middle">CALL STACK</text>
</svg>
