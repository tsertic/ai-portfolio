<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <!-- Client box -->
  <rect x="10" y="80" width="90" height="50" rx="8" stroke="currentColor" stroke-width="1.5" fill="currentColor" fill-opacity="0.06" opacity="0.5"/>
  <text x="55" y="110" font-family="monospace" font-size="11" fill="currentColor" opacity="0.45" text-anchor="middle">CLIENT</text>
  <!-- Server box -->
  <rect x="220" y="80" width="90" height="50" rx="8" stroke="currentColor" stroke-width="1.5" fill="currentColor" fill-opacity="0.06" opacity="0.5"/>
  <text x="265" y="110" font-family="monospace" font-size="11" fill="currentColor" opacity="0.45" text-anchor="middle">SERVER</text>
  <!-- GET request arrow -->
  <path d="M100 95 L220 95" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.45" marker-end="url(#arr)"/>
  <text x="160" y="88" font-family="monospace" font-size="10" fill="currentColor" opacity="0.5" text-anchor="middle">GET /api/data</text>
  <!-- Response arrow -->
  <path d="M220 118 L100 118" stroke="currentColor" stroke-width="1.5" opacity="0.45" marker-end="url(#arr2)"/>
  <text x="160" y="135" font-family="monospace" font-size="10" fill="currentColor" opacity="0.4" text-anchor="middle">200 OK {json}</text>
  <!-- Method badges -->
  <rect x="118" y="40" width="36" height="16" rx="4" fill="currentColor" opacity="0.2"/>
  <rect x="160" y="40" width="40" height="16" rx="4" fill="currentColor" opacity="0.15"/>
  <rect x="206" y="40" width="36" height="16" rx="4" fill="currentColor" opacity="0.12"/>
  <text x="136" y="52" font-family="monospace" font-size="9" fill="currentColor" opacity="0.5" text-anchor="middle">POST</text>
  <text x="180" y="52" font-family="monospace" font-size="9" fill="currentColor" opacity="0.4" text-anchor="middle">PATCH</text>
  <text x="224" y="52" font-family="monospace" font-size="9" fill="currentColor" opacity="0.35" text-anchor="middle">DEL</text>
  <defs>
    <marker id="arr"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="currentColor" opacity="0.45"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6Z" fill="currentColor" opacity="0.45"/>
    </marker>
  </defs>
</svg>
